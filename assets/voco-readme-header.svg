<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">VOCO README header</title>
  <desc id="desc">Graphite VOCO banner with a premium microphone mark and Linux-first dictation branding.</desc>

  <rect width="1200" height="640" rx="40" fill="#090A0D"/>
  <rect x="1" y="1" width="1198" height="638" rx="39" stroke="#232830"/>

  <ellipse cx="166" cy="160" rx="92" ry="68" fill="#E1E5EC" opacity="0.07"/>
  <ellipse cx="166" cy="160" rx="48" ry="36" fill="#FFFFFF" opacity="0.04"/>

  <g transform="translate(48 106)">
    <rect x="0" y="0" width="88" height="88" rx="24" fill="#101319"/>
    <rect x="1" y="1" width="86" height="86" rx="23" stroke="#2B3038"/>
    <circle cx="44" cy="44" r="25" fill="url(#orb)"/>
    <circle cx="44" cy="44" r="24.5" stroke="#F2F4F7" stroke-opacity="0.24"/>
    <rect x="37" y="24" width="14" height="22" rx="7" fill="#FFFFFF" fill-opacity="0.92"/>
    <path d="M31 43C31 51.8366 38.1634 59 47 59C55.8366 59 63 51.8366 63 43" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.88"/>
    <rect x="42" y="51" width="4" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.84"/>
    <rect x="33.5" y="66" width="21" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.76"/>
  </g>

  <g transform="translate(312 148)" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="38" font-size="20" font-weight="500" letter-spacing="7.5" fill="#9EA4AF">VOCO</text>
    <text x="0" y="114" font-size="54" font-weight="600" letter-spacing="-1.6" fill="#FFFFFF">Voice-native interface layer.</text>
    <text x="0" y="166" font-size="54" font-weight="600" letter-spacing="-1.6" fill="#FFFFFF">Built for Linux.</text>
    <text x="2" y="224" font-size="22" font-weight="500" fill="#C7CCD4">Local-first dictation with tray-native control and fast insertion at the cursor.</text>
  </g>

  <path d="M312 474H956" stroke="#232830" stroke-width="2"/>
  <path d="M312 474H516" stroke="#7A808A" stroke-width="2"/>

  <g transform="translate(312 500)" font-family="Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="28" font-size="18" font-weight="500" letter-spacing="3.2" fill="#8C929C">LOCAL FIRST · TRAY NATIVE · WAYLAND / X11</text>
  </g>

  <defs>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(44 37) rotate(54) scale(40)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.38" stop-color="#E1E5EC"/>
      <stop offset="1" stop-color="#7A808A"/>
    </radialGradient>
  </defs>
</svg>
