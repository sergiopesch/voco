<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="#0A0A0A"/>

  <!-- Microphone icon -->
  <g transform="translate(28, 10)">
    <!-- Mic head (capsule) -->
    <rect x="24" y="0" width="32" height="52" rx="16" fill="#0EA5E9"/>
    <!-- Mic head highlight -->
    <rect x="30" y="6" width="8" height="20" rx="4" fill="#38BDF8" opacity="0.5"/>

    <!-- Pickup arc -->
    <path d="M14,52 Q14,78 40,78 Q66,78 66,52" stroke="#0EA5E9" stroke-width="5" fill="none" opacity="0.7"/>

    <!-- Stand -->
    <rect x="37" y="78" width="6" height="14" rx="3" fill="#0EA5E9" opacity="0.8"/>

    <!-- Base -->
    <rect x="22" y="90" width="36" height="6" rx="3" fill="#0EA5E9" opacity="0.6"/>

    <!-- Sound waves (right) -->
    <path d="M72,20 Q82,26 72,36" stroke="#0EA5E9" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M78,14 Q92,26 78,42" stroke="#0EA5E9" stroke-width="3" fill="none" opacity="0.25" stroke-linecap="round"/>

    <!-- Sound waves (left) -->
    <path d="M8,20 Q-2,26 8,36" stroke="#0EA5E9" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M2,14 Q-12,26 2,42" stroke="#0EA5E9" stroke-width="3" fill="none" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- VOICE text -->
  <text x="130" y="78" font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="900" letter-spacing="6" fill="white">
    VOICE
  </text>

  <!-- Accent underline -->
  <rect x="130" y="88" width="250" height="3" rx="1.5" fill="#0EA5E9"/>
</svg>
