name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            desktop-file-utils appstream

      - name: Install Node dependencies
        run: npm ci

      - name: Verify version consistency
        run: npm run verify:versions

      - name: Validate install and build scripts
        run: |
          bash -n install scripts/install.sh scripts/setup.sh scripts/build-desktop.sh scripts/package-appimage.sh scripts/render-release-body.sh scripts/rehearse-release.sh scripts/lib/install-common.sh
          python3 -m py_compile scripts/generate-icons.py

      - name: TypeScript check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Frontend production build
        run: npm --workspace @voco/desktop run build:frontend

      - name: Validate desktop metadata
        run: desktop-file-validate packaging/flatpak/com.sergiopesch.voco.desktop

      - name: Validate AppStream metadata
        run: appstreamcli validate packaging/flatpak/com.sergiopesch.voco.metainfo.xml

  rust:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: Cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test
