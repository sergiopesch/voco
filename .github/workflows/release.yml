name: Release

on:
  push:
    tags:
      - "voco.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Validate canonical release tag
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="voco.${VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match ${EXPECTED_TAG}." >&2
            exit 1
          fi
          echo "tag_name=${EXPECTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=VOCO ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev clang mold cmake file wget

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.0
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: DevOps preflight
        run: npm run verify:devops

      - name: Dependency security audit
        run: npm run verify:security

      - name: Frontend quality gate
        run: npm run check && npm run lint && npm test && npm --workspace @voco/desktop run build:frontend

      - name: Rust quality gate
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check && cargo test && cargo clippy --all-targets --all-features -- -D warnings

      - name: Configure mold linker
        run: |
          mkdir -p apps/desktop/src-tauri/.cargo
          printf '[target.x86_64-unknown-linux-gnu]\nlinker = "clang"\nrustflags = ["-C", "link-arg=-fuse-ld=mold"]\n' > apps/desktop/src-tauri/.cargo/config.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "2.10.1" --locked

      - name: Build Debian bundle
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build --features custom-protocol --bundles deb

      - name: Attempt AppImage bundle
        id: build_appimage
        continue-on-error: true
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build --features custom-protocol --bundles appimage

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name "*${{ steps.version.outputs.version }}*amd64.deb" | sort | tail -1)
          if [ -z "$DEB" ]; then
            echo "Versioned Debian artifact was not produced." >&2
            exit 1
          fi
          cp "$DEB" "voco_${{ steps.version.outputs.version }}_amd64.deb"
          cp "$DEB" "voco_latest_amd64.deb"
          APPIMAGE=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name "*${{ steps.version.outputs.version }}*.AppImage" | sort | tail -1 || true)
          if [ -n "$APPIMAGE" ]; then
            APPIMAGE_NAME="VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage"
            cp "$APPIMAGE" "${APPIMAGE_NAME}"
            echo "has_appimage=true" >> "$GITHUB_OUTPUT"
            echo "appimage_name=${APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "has_appimage=false" >> "$GITHUB_OUTPUT"
            echo "appimage_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Render release notes
        shell: bash
        run: |
          bash ./scripts/render-release-body.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.tag_name }}" \
            "${{ steps.artifacts.outputs.appimage_name }}" > release-body.md

      - name: Generate checksums
        shell: bash
        run: |
          if [ -f "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" ]; then
            sha256sum "voco_${{ steps.version.outputs.version }}_amd64.deb" "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" > voco_checksums.txt
          else
            sha256sum "voco_${{ steps.version.outputs.version }}_amd64.deb" > voco_checksums.txt
          fi
          sha256sum voco_latest_amd64.deb > voco_latest_checksums.txt
          mkdir release-assets
          cp \
            "voco_${{ steps.version.outputs.version }}_amd64.deb" \
            voco_latest_amd64.deb \
            voco_checksums.txt \
            voco_latest_checksums.txt \
            release-assets/
          if [ -f "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" ]; then
            cp "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" release-assets/
          fi

      - name: Create draft GitHub Release with verified assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ steps.version.outputs.release_name }}
          body_path: release-body.md
          files: release-assets/*
          draft: true
          prerelease: false
