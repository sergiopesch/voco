name: Release

on:
  push:
    tags:
      - "v*"
      - "voco.*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev clang mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Configure mold linker
        run: |
          mkdir -p apps/desktop/src-tauri/.cargo
          printf '[target.x86_64-unknown-linux-gnu]\nlinker = "clang"\nrustflags = ["-C", "link-arg=-fuse-ld=mold"]\n' > apps/desktop/src-tauri/.cargo/config.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Debian bundle
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build --bundles deb

      - name: Attempt AppImage bundle
        id: build_appimage
        continue-on-error: true
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build --bundles appimage

      - name: Resolve release metadata from tag
        id: version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$TAG_NAME" == voco.* ]]; then
            VERSION="${TAG_NAME#voco.}"
            RELEASE_NAME="VOCO ${VERSION}"
          elif [[ "$TAG_NAME" == v* ]]; then
            VERSION="${TAG_NAME#v}"
            RELEASE_NAME="VOCO ${VERSION}"
          else
            VERSION="$TAG_NAME"
            RELEASE_NAME="VOCO ${VERSION}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name "*.deb" | sort | tail -1)
          cp "$DEB" "voco_${{ steps.version.outputs.version }}_amd64.deb"
          APPIMAGE=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name "*.AppImage" | sort | tail -1 || true)
          if [ -z "$APPIMAGE" ] && [ -d apps/desktop/src-tauri/target/release/bundle/appimage/VOCO.AppDir ]; then
            APPIMAGE=$(VOCO_APPIMAGE_VERSION="${{ steps.version.outputs.version }}" bash ./scripts/package-appimage.sh | tail -n 1)
          fi
          if [ -n "$APPIMAGE" ]; then
            APPIMAGE_NAME="VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage"
            cp "$APPIMAGE" "${APPIMAGE_NAME}"
            echo "has_appimage=true" >> "$GITHUB_OUTPUT"
            echo "appimage_name=${APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "has_appimage=false" >> "$GITHUB_OUTPUT"
            echo "appimage_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Render release notes
        shell: bash
        run: |
          bash ./scripts/render-release-body.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.tag_name }}" \
            "${{ steps.artifacts.outputs.appimage_name }}" > release-body.md

      - name: Generate checksums
        shell: bash
        run: |
          if [ -f "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" ]; then
            sha256sum "voco_${{ steps.version.outputs.version }}_amd64.deb" "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage" > voco_checksums.txt
          else
            sha256sum "voco_${{ steps.version.outputs.version }}_amd64.deb" > voco_checksums.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.release_name }}
          body_path: release-body.md
          files: |
            voco_${{ steps.version.outputs.version }}_amd64.deb
            voco_checksums.txt
          draft: false
          prerelease: false

      - name: Upload AppImage asset
        if: steps.artifacts.outputs.has_appimage == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag_name }}" \
            "${{ steps.artifacts.outputs.appimage_name }}" \
            --repo "${{ github.repository }}" \
            --clobber
