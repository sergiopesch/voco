name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev clang mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Configure mold linker
        run: |
          mkdir -p apps/desktop/src-tauri/.cargo
          cat > apps/desktop/src-tauri/.cargo/config.toml <<'TOML'
          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=mold"]
          TOML

      - name: Build
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Rename .deb for release
        run: |
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "Voice_${{ steps.version.outputs.version }}_amd64.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Voice v${{ steps.version.outputs.version }}
          body: |
            ## Install

            ```bash
            # Download and install
            wget https://github.com/sergiopesch/voice/releases/download/v${{ steps.version.outputs.version }}/Voice_${{ steps.version.outputs.version }}_amd64.deb
            sudo dpkg -i Voice_${{ steps.version.outputs.version }}_amd64.deb
            ```

            **Requirements:** Ubuntu/Debian with `libwebkit2gtk-4.1-0`, `libgtk-3-0`, `libayatana-appindicator3-1`

            **Wayland users:** `sudo apt install ydotool wl-clipboard && sudo usermod -aG input $USER`

            **X11 users:** `sudo apt install xdotool xclip`

            First launch downloads the speech model (~142 MB, one-time). Then press **Alt+D** to dictate!
          files: |
            Voice_${{ steps.version.outputs.version }}_amd64.deb
          draft: false
          prerelease: false
