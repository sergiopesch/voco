name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev clang mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Configure mold linker
        run: |
          mkdir -p apps/desktop/src-tauri/.cargo
          printf '[target.x86_64-unknown-linux-gnu]\nlinker = "clang"\nrustflags = ["-C", "link-arg=-fuse-ld=mold"]\n' > apps/desktop/src-tauri/.cargo/config.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        working-directory: apps/desktop
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: cargo tauri build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Collect release artifacts
        run: |
          DEB=$(find apps/desktop/src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "voco_${{ steps.version.outputs.version }}_amd64.deb"
          APPIMAGE=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1 || true)
          if [ -z "$APPIMAGE" ] && [ -d apps/desktop/src-tauri/target/release/bundle/appimage/VOCO.AppDir ]; then
            APPIMAGE=$(bash ./scripts/package-appimage.sh)
          fi
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage"
          fi

      - name: Generate checksums
        run: |
          sha256sum voco_${{ steps.version.outputs.version }}_amd64.deb VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage 2>/dev/null > voco_checksums.txt || sha256sum "voco_${{ steps.version.outputs.version }}_amd64.deb" > voco_checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VOCO v${{ steps.version.outputs.version }}
          body: |
            ## Summary

            Premium Linux-first dictation, now shipping under the VOCO name.

            ## Install

            ### Debian / Ubuntu

            ```bash
            # Download and install
            wget https://github.com/sergiopesch/voco/releases/download/v${{ steps.version.outputs.version }}/voco_${{ steps.version.outputs.version }}_amd64.deb
            wget https://github.com/sergiopesch/voco/releases/download/v${{ steps.version.outputs.version }}/voco_checksums.txt
            sha256sum --check voco_checksums.txt
            sudo dpkg -i voco_${{ steps.version.outputs.version }}_amd64.deb
            ```

            ### Portable AppImage

            ```bash
            wget https://github.com/sergiopesch/voco/releases/download/v${{ steps.version.outputs.version }}/VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage
            chmod +x VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage
            ./VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage
            ```

            **Requirements:** Ubuntu/Debian with `libwebkit2gtk-4.1-0`, `libgtk-3-0`, `libayatana-appindicator3-1`

            **Wayland users:** `sudo apt install ydotool wl-clipboard && sudo usermod -aG input $USER`

            **X11 users:** `sudo apt install xdotool xclip`

            ## Upgrade notes

            - Existing `voice` config is migrated to `~/.config/voco`
            - Existing local models are reused from the prior install when present
            - Restart VOCO after upgrading if it is already running

            ## Known issues

            - First launch still downloads the speech model (~142 MB, one-time)
            - Wayland text insertion depends on `ydotool` and compositor support
          files: |
            voco_${{ steps.version.outputs.version }}_amd64.deb
            VOCO-${{ steps.version.outputs.version }}-x86_64.AppImage
            voco_checksums.txt
          draft: false
          prerelease: false
